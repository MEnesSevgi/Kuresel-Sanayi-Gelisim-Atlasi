  <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Küresel Sanayi Gelişim Atlası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #c5a059;
            --background-color: #f8f9fa;
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            flex-direction: row;
            font-family: 'Arial', sans-serif;
            background: var(--background-color);
            overflow: hidden;
        }

        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        #info-panel {
            width: 450px;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .header {
            background: var(--primary-color);
            color: var(--secondary-color);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--secondary-color);
            flex-shrink: 0; /* Başlığın küçülmesini engeller */
        }

        .header h1 { margin: 0; font-size: 18px; letter-spacing: 1.5px; }

        .selector-area {
            padding: 15px;
            background: #f1f1f1;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0; /* Seçim alanının küçülmesini engeller */
        }

        #event-selector {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 2px solid var(--secondary-color);
            font-size: 14px;
            background: white;
        }

        #content-area {
            padding: 20px;
            overflow-y: auto; /* İçerik taşarsa panel içinde kaydırılır */
            flex: 1; /* Panelin kalan tüm boşluğunu doldurur */
            display: flex;
            flex-direction: column;
        }

        #event-title { font-size: 22px; color: var(--primary-color); margin-top: 0; }

        #event-desc {
            line-height: 1.6;
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
        }

        #event-img {
            width: 100%;
            border-radius: 4px;
            margin-bottom: 15px;
            object-fit: cover;
            max-height: 200px;
            display: none;
        }

        #wiki-link {
            display: none;
            padding: 12px;
            background-color: var(--primary-color);
            color: var(--secondary-color);
            text-decoration: none;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            margin-top: auto; /* Butonu her zaman en alta iter */
            flex-shrink: 0;
        }

        /* --- MOBİL GÜNCELLEMELERİ --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }

            #map {
                height: 45vh; /* Tam %50 yükseklik */
                
                flex: none;
            }

            #info-panel {
                width: 100%;
                height: 50vh; /* Tam %50 yükseklik */
                box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            }

            .header { padding: 10px; }
            .header h1 { font-size: 16px; }
            
            #content-area {
                padding: 15px;
                /* İçeriğin butonun altında kalmaması için padding-bottom ekliyoruz */
                padding-bottom: 20px; 
            }

            #wiki-link {
                margin-top: 15px;
                position: sticky; /* Kaydırma yapılsa bile görünür kalabilir */
                bottom: 0;
            }
        }

        .custom-marker {
            background-color: var(--secondary-color);
            border: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>

    <div class="header"><h1>Küresel Sanayi Gelişim Atlası</h1></div>

    <div class="selector-area">

</div>

    const map = L.map("map").setView([30, 15], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    function populateSelect() {
        const sel = document.getElementById("event-selector");
        industrialEvents.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item.name;
            opt.textContent = `${item.year} - ${item.event}`;
            sel.appendChild(opt);
        });
    }

    async function selectEvent(eventName) {
        const selectedEvent = industrialEvents.find(item => item.name === eventName);
        if (selectedEvent) {
            map.flyTo([selectedEvent.lat, selectedEvent.lng], 12);
            document.getElementById("event-title").textContent = selectedEvent.name;
            
            const wikiBtn = document.getElementById("wiki-link");
            wikiBtn.href = `https://en.wikipedia.org/wiki/${selectedEvent.wiki}`;
            wikiBtn.style.display = "block";

            await updateWiki(selectedEvent.wiki);
        }
    }

    async function updateWiki(wikiPage) {
        const img = document.getElementById("event-img");
        const descElement = document.getElementById("event-desc");
        img.style.display = "none";
        descElement.textContent = "Bilgiler yükleniyor...";

        try {
            const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wikiPage}`);
            const data = await res.json();
            
            let shortText = data.extract;
            if (shortText.length > 400) {
                const sentences = shortText.match(/[^\.!\?]+[\.!\?]+/g);
                shortText = sentences ? sentences.slice(0, 2).join(' ') : shortText.substring(0, 400) + "...";
            }

            const translatedText = await translateText(shortText);
            descElement.textContent = translatedText;
            
            if (data.thumbnail) {
                img.src = data.thumbnail.source;
                img.style.display = "block";
            }
        } catch (error) {
            descElement.textContent = "Bilgiye ulaşılamadı.";
        }
    }

    async function translateText(text) {
        const safeText = text.substring(0, 500); 
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(safeText)}&langpair=en|tr`);
            const data = await res.json();
            return data.responseData.translatedText || text;
        } catch (error) {
            return text;
        }
    }

    industrialEvents.forEach(item => {
        const marker = L.marker([item.lat, item.lng], {
            icon: L.divIcon({
                className: 'custom-marker',
                html: '<span>📍</span>',
                iconSize: [20, 20]
            })
        }).addTo(map);

        marker.on('click', () => {
            document.getElementById("event-selector").value = item.name;
            selectEvent(item.name);
        });
    });

    populateSelect();
</script>
